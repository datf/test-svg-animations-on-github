<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        .scene {
          width: 400px;
          height: 300px;
          perspective: 1200px;
          display: flex;
          justify-content: center;
          align-items: center;
          font-family: sans-serif;
        }

        .carousel {
          width: 250px;
          height: 150px;
          position: relative;
          transform-style: preserve-3d;
        }

        .card {
          position: absolute;
          width: 250px;
          height: 150px;
          background: linear-gradient(135deg, #16213e, #0f3460);
          border: 2px solid #e94560;
          border-radius: 15px;
          color: white;
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 1.5rem;
          font-weight: bold;
          backface-visibility: hidden;

          animation: revolve 30s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:nth-child(1)  { animation-delay: 0s; }
        .card:nth-child(2)  { animation-delay: -3s; }
        .card:nth-child(3)  { animation-delay: -6s; }
        .card:nth-child(4)  { animation-delay: -9s; }
        .card:nth-child(5)  { animation-delay: -12s; }
        .card:nth-child(6)  { animation-delay: -15s; }
        .card:nth-child(7)  { animation-delay: -18s; }
        .card:nth-child(8)  { animation-delay: -21s; }
        .card:nth-child(9)  { animation-delay: -24s; }
        .card:nth-child(10) { animation-delay: -27s; }
        @keyframes revolve {
           0.00%,  6.66% { transform: rotateX(0deg)   translateZ(250px); opacity: 1;}
          10.00%, 16.66% { transform: rotateX(36deg)  translateZ(250px); opacity: 1;}
          20.00%, 26.66% { transform: rotateX(72deg)  translateZ(250px); opacity: 0;}
          30.00%, 36.66% { transform: rotateX(108deg) translateZ(250px); opacity: 0;}
          40.00%, 46.66% { transform: rotateX(144deg) translateZ(250px); opacity: 0;}
          50.00%, 56.66% { transform: rotateX(180deg) translateZ(250px); opacity: 0;}
          60.00%, 66.66% { transform: rotateX(216deg) translateZ(250px); opacity: 0;}
          70.00%, 76.66% { transform: rotateX(252deg) translateZ(250px); opacity: 0;}
          80.00%, 86.66% { transform: rotateX(288deg) translateZ(250px); opacity: 0;}
          90.00%, 96.66% { transform: rotateX(324deg) translateZ(250px); opacity: 1;}
          100%           { transform: rotateX(360deg) translateZ(250px); opacity: 1;}
        }
      </style>

      <div class="scene">
        <div class="carousel">
          <div class="card">Card 1</div>
          <div class="card">Card 2</div>
          <div class="card">Card 3</div>
          <div class="card">Card 4</div>
          <div class="card">Card 5</div>
          <div class="card">Card 6</div>
          <div class="card">Card 7</div>
          <div class="card">Card 8</div>
          <div class="card">Card 9</div>
          <div class="card">Card 10</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
