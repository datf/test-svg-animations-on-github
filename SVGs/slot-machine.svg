<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --bg-scene: #1a1a2e;
          --text-color: white;
          --left-bg: #e94560;
          --right-bg: #16213e;
          --duration: 10s;
        }

        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        .scene {
          width: 800px;
          height: 200px;
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 20px;
          padding: 0 40px;
          font-family: sans-serif;
          background-color: var(--bg-scene);
        }

        .cylinder {
          height: 160px;
          position: relative;
          border-radius: 15px;
          overflow: hidden;
        }

        .cylinder.left {
          width: 140px;
          background: var(--left-bg);
        }

        .cylinder.right {
          flex: 1;
          background: var(--right-bg);
          border: 2px solid #e94560;
        }

        .track {
          display: flex;
          flex-direction: column;
          width: 100%;
        }

        .track.left-track {
          animation: roll-up var(--duration) linear infinite;
        }

        .track.right-track {
          animation: roll-down var(--duration) linear infinite;
        }

        .item {
          height: 53.33px;
          width: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
          color: var(--text-color);
          font-weight: bold;
          flex-shrink: 0;
        }

        .cylinder.left .item {
          font-size: 2.5rem;
        }

        .cylinder.right .item {
          font-size: 1.2rem;
          padding: 0 20px;
          text-align: center;
        }

        .shadow-overlay {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          pointer-events: none;
          background: linear-gradient(
            to bottom,
            rgba(26, 26, 46, 1) 0%,
            rgba(26, 26, 46, 0) 25%,
            rgba(26, 26, 46, 0) 75%,
            rgba(26, 26, 46, 1) 100%
          );
        }

        @keyframes roll-up {
          0% { transform: translateY(0); }
          100% { transform: translateY(-50%); }
        }

        @keyframes roll-down {
          0% { transform: translateY(-50%); }
          100% { transform: translateY(0); }
        }
      </style>

      <div class="scene">
        <div class="cylinder left">
          <div class="track left-track">
            <div class="item">01</div>
            <div class="item">02</div>
            <div class="item">03</div>
            <div class="item">04</div>
            <div class="item">05</div>
            <div class="item">01</div>
            <div class="item">02</div>
            <div class="item">03</div>
            <div class="item">04</div>
            <div class="item">05</div>
          </div>
          <div class="shadow-overlay"></div>
        </div>

        <div class="cylinder right">
          <div class="track right-track">
            <div class="item">First card is always first</div>
            <div class="item">Second should always come after</div>
            <div class="item">Third should be number three</div>
            <div class="item">Fourth card before the last</div>
            <div class="item">Fifth card with right opacity</div>
            <div class="item">First card is always first</div>
            <div class="item">Second should always come after</div>
            <div class="item">Third should be number three</div>
            <div class="item">Fourth card before the last</div>
            <div class="item">Fifth card with right opacity</div>
          </div>
          <div class="shadow-overlay"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
