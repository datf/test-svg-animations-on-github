<svg width="200" height="200">
  <rect x="50" y="50" width="100" height="100" fill="royalblue">
    <animateTransform 
      attributeName="transform" 
      type="scale" 
      from="1" to="1.2" 
      begin="mouseover" 
      dur="0.2s" 
      fill="freeze" />
      
    <animateTransform 
      attributeName="transform" 
      type="scale" 
      from="1.2" to="1" 
      begin="mouseout" 
      dur="0.2s" 
      fill="freeze" />
    </rect>
</svg>
